<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Nova Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            min-height: 100vh;
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 2.5rem;
        }

        .glow-blue { border-color: rgba(14, 165, 233, 0.4); box-shadow: 0 0 20px rgba(14, 165, 233, 0.1); }
        .glow-amber { border-color: rgba(245, 158, 11, 0.4); box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }

        .pill-container {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
            border-radius: 1.25rem;
        }

        @keyframes pulse-red { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } }
        .animate-alert { animation: pulse-red 1.5s infinite ease-in-out; }

        .gauge-ring { transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .blue-glow { filter: drop-shadow(0 0 8px #0ea5e9); }
        .amber-glow { filter: drop-shadow(0 0 8px #f59e0b); }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-2xl space-y-8">

        <div id="warning-banner" class="hidden animate-alert w-full bg-gradient-to-r from-red-900 via-red-600 to-red-900 py-4 px-6 rounded-3xl shadow-[0_0_30px_rgba(220,38,38,0.4)] flex items-center justify-center gap-3 border border-red-500/40">
            <span class="text-xl">⚠️</span>
            <span class="font-black tracking-widest text-xs md:text-sm uppercase text-white">Warning: High System Load Detected!</span>
        </div>

        <div class="glass-card p-8 md:p-10 text-center space-y-6 relative overflow-hidden">
            <div class="space-y-2">
                <h1 class="text-3xl font-black tracking-tighter text-white">Tech Nova Monitor</h1>
                <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold">Futuristic IoT Dashboard</p>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <span class="flex items-center gap-2 bg-emerald-500/10 text-emerald-400 text-[10px] font-black px-4 py-2 rounded-full border border-emerald-500/20">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span> ONLINE
                </span>
                <span class="bg-slate-800/60 text-slate-400 text-[10px] font-black px-4 py-2 rounded-full border border-slate-700">
                    🛰️ CLOUD SYNC
                </span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card glow-blue p-6 space-y-6">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">💧</span>
                    <h2 class="font-black text-white text-lg">Water Flow</h2>
                </div>
                <div class="relative flex justify-center items-center">
                    <svg class="w-48 h-48 transform -rotate-90">
                        <circle cx="96" cy="96" r="80" stroke="#1e293b" stroke-width="10" fill="transparent" />
                        <circle id="water-gauge" cx="96" cy="96" r="80" stroke="url(#blueGrad)" stroke-width="12" stroke-dasharray="502.6" stroke-dashoffset="502.6" stroke-linecap="round" fill="transparent" class="gauge-ring blue-glow" />
                        <defs><linearGradient id="blueGrad"><stop offset="0%" stop-color="#0ea5e9" /><stop offset="100%" stop-color="#22d3ee" /></linearGradient></defs>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="water-val" class="text-4xl font-black text-white">0.00</span>
                        <span class="text-[8px] font-bold text-slate-500 tracking-widest">L/MIN</span>
                    </div>
                </div>
            </div>

            <div class="glass-card glow-amber p-6 space-y-6">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">⚡</span>
                    <h2 class="font-black text-white text-lg">Current</h2>
                </div>
                <div class="relative flex justify-center items-center">
                    <svg class="w-48 h-48 transform -rotate-90">
                        <circle cx="96" cy="96" r="80" stroke="#1e293b" stroke-width="10" fill="transparent" />
                        <circle id="current-gauge" cx="96" cy="96" r="80" stroke="url(#amberGrad)" stroke-width="12" stroke-dasharray="502.6" stroke-dashoffset="502.6" stroke-linecap="round" fill="transparent" class="gauge-ring amber-glow" />
                        <defs><linearGradient id="amberGrad"><stop offset="0%" stop-color="#f59e0b" /><stop offset="100%" stop-color="#fbbf24" /></linearGradient></defs>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="current-val" class="text-4xl font-black text-white">0.00</span>
                        <span class="text-[8px] font-bold text-slate-500 tracking-widest">AMPS</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card p-8 space-y-6">
            <h2 class="text-xl font-black text-white flex items-center gap-2">
                <span class="w-2 h-6 bg-sky-500 rounded-full"></span> Live Usage History
            </h2>
            <div class="h-64 w-full">
                <canvas id="liveChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        // --- CONFIG ---
        const config = { databaseURL: "https://technova-4e0c6-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // --- CHART SETUP ---
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Water (L/m)', borderColor: '#0ea5e9', backgroundColor: 'rgba(14, 165, 233, 0.1)', data: [], fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0 },
                    { label: 'Current (A)', borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.1)', data: [], fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#94a3b8', font: { weight: 'bold' } } } },
                scales: {
                    x: { display: false },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
                }
            }
        });

        function updateRing(id, val, max) {
            const circle = document.getElementById(id);
            const circumference = 502.6;
            const percentage = Math.min((val / max) * 100, 100);
            circle.style.strokeDashoffset = circumference - (percentage / 100 * circumference);
        }

        // --- DATA LISTENER ---
        db.ref('sensors').on('value', (snap) => {
            const data = snap.val();
            const flow = data.water_flow || 0;
            const amps = data.current_amps || 0;
            const now = new Date().toLocaleTimeString();

            // Update UI Gauges
            document.getElementById('water-val').innerText = flow.toFixed(2);
            document.getElementById('current-val').innerText = amps.toFixed(2);
            updateRing('water-gauge', flow, 30);
            updateRing('current-gauge', amps, 10);

            // Update Graph
            if (liveChart.data.labels.length > 20) {
                liveChart.data.labels.shift();
                liveChart.data.datasets[0].data.shift();
                liveChart.data.datasets[1].data.shift();
            }
            liveChart.data.labels.push(now);
            liveChart.data.datasets[0].data.push(flow);
            liveChart.data.datasets[1].data.push(amps);
            liveChart.update('none');

            // Warning
            document.getElementById('warning-banner').style.display = (flow > 20 || amps > 7) ? 'flex' : 'none';
        });
    </script>
</body>
</html>
